<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BANORTE - Inversiones</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --rojo-banorte: #EB0029;
            --blanco: #FFFFFF;
            --azul-claro: #F0F4F8;
            --texto-oscuro: #1D1D1F; 
            --texto-gris: #86868B;
            --borde-sutil: rgba(0, 0, 0, 0.06);
            --verde-exito: #34C759;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--azul-claro); color: var(--texto-oscuro); overflow-x: hidden; }

        nav {
            position: fixed; top: 0; width: 100%; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; 
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px); z-index: 1000; border-bottom: 1px solid var(--borde-sutil);
        }
        .logo { font-size: 1.8rem; font-weight: 900; letter-spacing: -1px; color: var(--rojo-banorte); text-decoration: none; text-transform: uppercase; }

        .container { max-width: 1200px; margin: 0 auto; padding: 150px 5% 100px 5%; display: flex; flex-direction: column; min-height: 100vh; }
        
        .back-link { display: inline-flex; align-items: center; gap: 10px; color: var(--texto-gris); text-decoration: none; font-weight: 600; margin-bottom: 40px; transition: color 0.3s; align-self: flex-start; }
        .back-link:hover { color: var(--rojo-banorte); }

        .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; }
        
        .text-area h1 { font-size: clamp(3rem, 4vw, 4.5rem); font-weight: 900; letter-spacing: -2px; line-height: 1.1; margin-bottom: 20px; }
        .text-area p { font-size: 1.3rem; color: var(--texto-gris); line-height: 1.6; margin-bottom: 30px; }
        
        .stat-box { background: var(--blanco); padding: 20px; border-radius: 15px; display: inline-block; border: 1px solid var(--borde-sutil); box-shadow: 0 10px 20px rgba(0,0,0,0.02); margin-top: 20px; }
        .stat-box h4 { font-size: 0.9rem; color: var(--texto-gris); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .stat-box .number { font-size: 2.5rem; font-weight: 900; color: var(--verde-exito); }

        .media-area { width: 100%; aspect-ratio: 1/1; background-color: var(--blanco); border-radius: 40px; box-shadow: 0 30px 60px rgba(0,0,0,0.08); border: 1px solid var(--borde-sutil); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; }
        .media-area h3 { color: var(--texto-gris); opacity: 0.5; font-size: 1.5rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }

        @media (max-width: 900px) { .content-grid { grid-template-columns: 1fr; text-align: center; } .text-area { display: flex; flex-direction: column; align-items: center; } }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">BANORTE</a>
    </nav>

    <div class="container">
        <a href="index.html" class="back-link">&larr; Volver al inicio</a>
        
        <div class="content-grid">
            <div class="text-area">
                <div style="font-size: 4rem; margin-bottom: 10px;">📈</div>
                <h1>Multiplica tu patrimonio.</h1>
                <p>Genera sin temor. Con la nueva sección de inversiones, tienes acceso a portafolios diversificados diseñados por los expertos de Banorte, adaptados a tu perfil de riesgo.</p>
                
                <div class="stat-box">
                    <h4>Rendimiento Anual Estimado</h4>
                    <div class="number">+11.5%</div>
                </div>
            </div>
            
            <div class="media-area">
                <div style="font-size: 5rem; margin-bottom: 20px;">📊</div>
                <h3>[ Gráfica de Crecimiento ]</h3>
            </div>
        </div>
    </div>

</body>
</html>
